<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #1e293b;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 15px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid #3b82f6;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .success {
      display: none;
      margin-top: 20px;
      background: #065f46;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    @media(max-width:700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Registo de Pedidos</h1>
    <p class="subtitle">Preenche os dados abaixo para registo interno.</p>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido de Serviço">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="checkbox" name="botcheck" style="display:none;">
      
      <input type="hidden" name="DadosParaExcel" id="excelLinha">

      <div class="grid">
        <div>
          <label>Nome do Técnico/Responsável *</label>
          <input type="text" name="nome" required>
        </div>

        <div>
          <label>Data + Hora do Pedido *</label>
          <input type="datetime-local" name="data_hora" id="dataHora" required>
        </div>

        <div>
          <label>Requerente (Cliente/Pessoa) *</label>
          <input type="text" name="requerente" required>
        </div>

        <div>
          <label>Empresa *</label>
          <input type="text" name="empresa" required>
        </div>

        <div>
          <label>Via de Comunicação</label>
          <select name="via" id="viaSelect">
            <option value="">Selecionar</option>
            <option value="Chamada">Chamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div id="outrosDiv" style="display:none;">
          <label>Especificar Via</label>
          <input type="text" name="via_outros" id="viaOutrosInput" placeholder="Ex: WhatsApp, Email...">
        </div>

        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="servico" required></textarea>
        </div>

        <div>
          <label>Local / Obra *</label>
          <input type="text" name="local_obra" required>
        </div>

        <div>
          <label>Concelho</label>
          <input type="text" name="concelho">
        </div>

        <div>
          <label>Data + Hora Limite *</label>
          <input type="datetime-local" name="data_hora_limite" required>
        </div>

        <div class="full">
          <label>Observações (OBS)</label>
          <textarea name="obs"></textarea>
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      ✅ Pedido enviado com sucesso e pronto para registo!
    </div>
  </div>

  <script>
    // 1. DATA ATUAL AUTOMÁTICA
    function atualizarDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHora").value = now.toISOString().slice(0, 16);
    }
    atualizarDataAtual();

    // 2. LÓGICA DO CAMPO "OUTROS"
    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");
    viaSelect.addEventListener("change", () => {
      outrosDiv.style.display = viaSelect.value === "Outros" ? "block" : "none";
    });

    // 3. ENVIO E GERADOR DE LINHA EXCEL
    const form = document.getElementById("formulario");
    const btnEnviar = document.getElementById("btnEnviar");
    const successMsg = document.getElementById("successMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // PREPARAR LINHA DO EXCEL (TAB SEPARATED)
      // Usamos FormData para pegar os valores atuais de forma limpa
      const fd = new FormData(form);
      
      const nome = fd.get("nome");
      const dataH = fd.get("data_hora");
      const req = fd.get("requerente");
      const emp = fd.get("empresa");
      const via = fd.get("via") === "Outros" ? fd.get("via_outros") : fd.get("via");
      const serv = fd.get("servico").replace(/\n/g, " "); // Remove quebras de linha
      const loc = fd.get("local_obra");
      const conc = fd.get("concelho") || "-";
      const lim = fd.get("data_hora_limite");
      const obs = (fd.get("obs") || "-").replace(/\n/g, " ");

      // Monta a string separada por Tabs (\t)
      const linhaExcel = `${nome}\t${dataH}\t${req}\t${emp}\t${via}\t${serv}\t${loc}\t${conc}\t${lim}\t${obs}`;
      
      // Injeta no campo oculto antes de enviar
      document.getElementById("excelLinha").value = linhaExcel;

      // FEEDBACK UI
      btnEnviar.disabled = true;
      btnEnviar.innerText = "A processar...";

      // ENVIO REAL
      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: new FormData(form) // Enviamos o FormData atualizado com a linha do excel
        });

        const result = await response.json();

        if (result.success) {
          successMsg.style.display = "block";
          form.reset();
          atualizarDataAtual();
          outrosDiv.style.display = "none";
          window.scrollTo({ top: 0, behavior: 'smooth' });
          
          setTimeout(() => { successMsg.style.display = "none"; }, 6000);
        } else {
          alert("Erro: " + result.message);
        }
      } catch (err) {
        alert("Erro de rede. Verifica a tua ligação.");
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
