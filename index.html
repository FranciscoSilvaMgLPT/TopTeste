<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      font-family:Arial, sans-serif;
      color:white;
      padding:30px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:#1e293b;
      padding:35px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    h1{
      font-size:34px;
      margin-bottom:25px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:white;
      font-size:15px;
    }

    input:focus,
    textarea:focus,
    select:focus{
      outline:2px solid #3b82f6;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
    }

    button:disabled{
      background:#64748b;
      cursor:not-allowed;
      opacity:0.6;
    }

    .success{
      display:none;
      margin-top:20px;
      background:#065f46;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    @media(max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Registo de Pedidos</h1>

    <form id="formulario"
      action="https://api.web3forms.com/submit"
      method="POST">

      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido - Sistema Interno">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="checkbox" name="botcheck" style="display:none;">

      <input type="hidden" name="00_LINHA_EXCEL" id="excelLinha">
      <input type="hidden" name="02_Data_Pedido" id="hiddenDataPedido">
      <input type="hidden" name="03_Hora_Pedido" id="hiddenHoraPedido">
      <input type="hidden" name="06_Via" id="hiddenVia">
      <input type="hidden" name="07_Via_Outros" id="hiddenViaOutros">
      <input type="hidden" name="13_Data_Limite" id="hiddenDataLimite">
      <input type="hidden" name="14_Hora_Limite" id="hiddenHoraLimite">
      <input type="hidden" name="15_Data_Fecho" id="hiddenDataFecho">
      <input type="hidden" name="16_Hora_Fecho" id="hiddenHoraFecho">

      <div class="grid">

        <div>
          <label>Nome do Técnico *</label>
          <input type="text" name="01_Nome_Tecnico" required>
        </div>

        <div>
          <label>Data + Hora Pedido *</label>
          <input type="datetime-local" id="dataPedidoInput" required>
        </div>

        <div>
          <label>Requerente *</label>
          <input type="text" name="04_Requerente" required>
        </div>

        <div>
          <label>Empresa *</label>
          <input type="text" name="05_Empresa" required>
        </div>

        <div>
          <label>Via *</label>
          <select id="viaSelect" required>
            <option value="">Selecionar</option>
            <option value="Chamada">Chamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Email">Email</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div id="outrosDiv" style="display:none;">
          <label>Via Outros</label>
          <input type="text" id="viaOutrosInput">
        </div>

        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="08_Servico" required></textarea>
        </div>

        <div>
          <label>Frequência</label>
          <input type="text" name="09_Frequencia">
        </div>

        <div>
          <label>Concelho</label>
          <input type="text" name="11_Concelho">
        </div>

        <div>
          <label>Local / Obra *</label>
          <input type="text" name="12_Local_Obra" required>
        </div>

        <div>
          <label>Data + Hora Limite</label>
          <input type="datetime-local" id="dataLimiteInput">
        </div>

        <div>
          <label>Data + Hora Fecho</label>
          <input type="datetime-local" id="dataFechoInput">
        </div>

        <div>
          <label>Tempo Dedicado</label>
          <input type="text" name="17_Tempo_Dedicado" placeholder="Ex: 2h30">
        </div>

        <div class="full">
          <label>Observações</label>
          <textarea name="18_Observações"></textarea>
        </div>

      </div>

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      ✅ Pedido enviado com sucesso.
    </div>

  </div>

  <script>
    function setNow(){
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataPedidoInput").value =
        now.toISOString().slice(0,16);
    }

    setNow();

    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");

    viaSelect.addEventListener("change", () => {
      outrosDiv.style.display =
        viaSelect.value === "Outros" ? "block" : "none";
    });

    const form = document.getElementById("formulario");
    const btnEnviar = document.getElementById("btnEnviar");
    const successMsg = document.getElementById("successMessage");

    function separarDataHora(id){
      const val = document.getElementById(id).value;
      if(!val) return ["-", "-"];
      return val.split("T");
    }

    form.addEventListener("submit", async function(e){
      e.preventDefault();

      const [dPed, hPed] = separarDataHora("dataPedidoInput");
      const [dLim, hLim] = separarDataHora("dataLimiteInput");
      const [dFec, hFec] = separarDataHora("dataFechoInput");

      document.getElementById("hiddenDataPedido").value = dPed;
      document.getElementById("hiddenHoraPedido").value = hPed;
      document.getElementById("hiddenDataLimite").value = dLim;
      document.getElementById("hiddenHoraLimite").value = hLim;
      document.getElementById("hiddenDataFecho").value = dFec;
      document.getElementById("hiddenHoraFecho").value = hFec;

      const via = viaSelect.value || "-";
      const viaOutros =
        via === "Outros"
          ? document.getElementById("viaOutrosInput").value || "-"
          : "-";

      document.getElementById("hiddenVia").value = via;
      document.getElementById("hiddenViaOutros").value = viaOutros;

      const fd = new FormData(form);

      const excel = [
        fd.get("01_Nome_Tecnico") || "-",
        dPed,
        hPed,
        fd.get("04_Requerente") || "-",
        fd.get("05_Empresa") || "-",
        via,
        viaOutros,
        (fd.get("08_Servico") || "-").replace(/\n/g," "),
        fd.get("09_Frequencia") || "-",
        fd.get("11_Concelho") || "-",
        fd.get("12_Local_Obra") || "-",
        dLim,
        hLim,
        dFec,
        hFec,
        fd.get("17_Tempo_Dedicado") || "-",
        (fd.get("18_Observações") || "-").replace(/\n/g," ")
      ].join(";");

      document.getElementById("excelLinha").value = excel;

      btnEnviar.disabled = true;
      btnEnviar.innerText = "A enviar...";

      try{
        const response = await fetch("https://api.web3forms.com/submit",{
          method:"POST",
          body:new FormData(form)
        });

        const result = await response.json();

        if(result.success){
          successMsg.style.display = "block";
          form.reset();
          setNow();
          outrosDiv.style.display = "none";

          window.scrollTo({ top:0, behavior:"smooth" });

          setTimeout(() => {
            successMsg.style.display = "none";
          }, 5000);
        } else {
          alert(result.message);
        }

      } catch(err){
        alert("Erro de ligação.");
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
