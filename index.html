<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pedidos Internos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#0f172a;

      font-family:Arial, Helvetica, sans-serif;

      color:white;

      padding:30px;

    }

    .container{

      max-width:750px;

      margin:auto;

      background:#1e293b;

      padding:35px;

      border-radius:18px;

      box-shadow:0 0 30px rgba(0,0,0,0.4);

    }

    h1{

      font-size:32px;

      margin-bottom:10px;

    }

    .subtitle{

      color:#94a3b8;

      margin-bottom:30px;

    }

    .grid{

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:15px;

    }

    .full{

      grid-column:1 / -1;

    }

    input,
    textarea,
    select{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      background:#334155;

      color:white;

      font-size:15px;

    }

    input:focus,
    textarea:focus,
    select:focus{

      outline:2px solid #3b82f6;

    }

    textarea{

      min-height:150px;

      resize:vertical;

    }

    button{

      width:100%;

      margin-top:20px;

      padding:16px;

      border:none;

      border-radius:10px;

      background:#2563eb;

      color:white;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.2s;

    }

    button:hover{

      background:#1d4ed8;

    }

    .success{

      display:none;

      margin-top:20px;

      background:#065f46;

      padding:15px;

      border-radius:10px;

      text-align:center;

    }

    @media(max-width:700px){

      .grid{

        grid-template-columns:1fr;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Pedidos Internos</h1>

    <p class="subtitle">
      Preenche os dados abaixo.
    </p>

    <form 
      id="formulario"
      action="https://api.web3forms.com/submit"
      method="POST"
    >

      <!-- WEB3FORMS -->

      <input 
        type="hidden" 
        name="access_key" 
        value="9f471d61-2558-4df2-a220-0028f59bd975"
      >

      <input 
        type="hidden" 
        name="subject" 
        value="Novo Pedido Interno"
      >

      <input 
        type="hidden" 
        name="from_name" 
        value="Sistema Interno"
      >

      <input 
        type="checkbox" 
        name="botcheck" 
        style="display:none;"
      >

      <div class="grid">

        <div>

          <input
            type="text"
            name="nome"
            placeholder="Nome"
            required
          >

        </div>

        <div>

          <input
            type="date"
            name="data"
            required
          >

        </div>

        <div class="full">

          <input
            type="text"
            name="obra"
            placeholder="Nome da obra"
            required
          >

        </div>

        <div>

          <input
            type="text"
            name="pedido_por"
            placeholder="Pedido por"
            required
          >

        </div>

        <div>

          <select
            name="prioridade"
            required
          >

            <option value="">
              Prioridade
            </option>

            <option value="Baixa">
              Baixa
            </option>

            <option value="Normal">
              Normal
            </option>

            <option value="Urgente">
              Urgente
            </option>

          </select>

        </div>

        <div class="full">

          <textarea
            name="descricao"
            placeholder="Descrição do pedido..."
            required
          ></textarea>

        </div>

      </div>

      <button type="submit">

        Enviar Pedido

      </button>

    </form>

    <div class="success" id="successMessage">

      Pedido enviado com sucesso.

    </div>

  </div>

  <script>

    const form = document.getElementById("formulario");

    const success = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e){

      e.preventDefault();

      const formData = new FormData(form);

      try{

        const response = await fetch(
          "https://api.web3forms.com/submit",
          {
            method:"POST",
            body:formData
          }
        );

        const data = await response.json();

        console.log(data);

        if(data.success){

          success.style.display = "block";

          form.reset();

        }
        else{

          alert(data.message);

        }

      }
      catch(error){

        console.log(error);

        alert("Erro de ligação.");

      }

    });

  </script>

</body>

</html>
