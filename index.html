<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pedido de Trabalho</title>

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#111827;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      padding:40px 20px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:#1f2937;
      padding:30px;
      border-radius:16px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      margin-bottom:10px;
      font-size:32px;
    }

    p{
      margin-bottom:25px;
      color:#9ca3af;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / -1;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#374151;
      color:white;
      font-size:15px;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    input:focus,
    textarea:focus,
    select:focus{
      outline:2px solid #2563eb;
    }

    button{
      width:100%;
      padding:16px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    .success{
      display:none;
      margin-top:20px;
      background:#065f46;
      padding:15px;
      border-radius:10px;
    }

    @media(max-width:700px){

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>
<body>

  <div class="container">

    <h1>Pedido de Trabalho</h1>

    <p>
      Preenche o formulário abaixo.
    </p>

    <form id="formulario">

      <input 
        type="hidden" 
        name="access_key" 
        value="SUA_API_KEY"
      >

      <div class="grid">

        <div>
          <input 
            type="text" 
            name="nome" 
            placeholder="Nome"
            required
          >
        </div>

        <div>
          <input 
            type="date" 
            name="data"
            required
          >
        </div>

        <div class="full">
          <input 
            type="text" 
            name="obra" 
            placeholder="Nome da obra"
            required
          >
        </div>

        <div>
          <input 
            type="text" 
            name="pedido_por" 
            placeholder="Pedido por"
            required
          >
        </div>

        <div>
          <select name="prioridade" required>
            <option value="">
              Prioridade
            </option>

            <option value="Baixa">
              Baixa
            </option>

            <option value="Normal">
              Normal
            </option>

            <option value="Urgente">
              Urgente
            </option>
          </select>
        </div>

        <div class="full">
          <textarea 
            name="mensagem" 
            placeholder="Descreve o pedido..."
            required
          ></textarea>
        </div>

      </div>

      <button type="submit">
        Enviar Pedido
      </button>

    </form>

    <div class="success" id="successMessage">
      Pedido enviado com sucesso.
    </div>

  </div>

  <script>

    const form = document.getElementById("formulario");
    const success = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e){

      e.preventDefault();

      const formData = new FormData(form);

      const response = await fetch(
        "https://api.web3forms.com/submit",
        {
          method:"POST",
          body:formData
        }
      );

      const data = await response.json();

      if(data.success){

        success.style.display = "block";

        form.reset();

      }else{

        alert("Erro ao enviar.");

      }

    });

  </script>

</body>
</html>
