<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #1e293b;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 15px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid #3b82f6;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .success {
      display: none;
      margin-top: 20px;
      background: #065f46;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    @media(max-width:700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Registo de Pedidos</h1>
    <p class="subtitle">Preenche os dados abaixo.</p>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <!-- WEB3FORMS -->
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="checkbox" name="botcheck" style="display:none;">
      
      <!-- CAMPO OCULTO MÁGICO PARA O EXCEL -->
      <input type="hidden" name="_Excel_Linha" id="excelLinha">

      <div class="grid">
        <!-- Nome -->
        <div>
          <label>Nome *</label>
          <input type="text" name="nome" id="nome" required>
        </div>

        <!-- Data Hora -->
        <div>
          <label>Data + Hora *</label>
          <input type="datetime-local" name="data_hora" id="dataHora" required>
        </div>

        <!-- Requerente -->
        <div>
          <label>Requerente *</label>
          <input type="text" name="requerente" id="requerente" required>
        </div>

        <!-- Empresa -->
        <div>
          <label>Empresa *</label>
          <input type="text" name="empresa" id="empresa" required>
        </div>

        <!-- Via -->
        <div>
          <label>Via</label>
          <select name="via" id="viaSelect">
            <option value="">Selecionar</option>
            <option value="Chamada">Chamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <!-- Outros -->
        <div id="outrosDiv" style="display:none;">
          <label>Especificar</label>
          <input type="text" name="via_outros" id="viaOutros" placeholder="Especificar">
        </div>

        <!-- Serviço -->
        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="servico" id="servico" required></textarea>
        </div>

        <!-- Local -->
        <div>
          <label>Local / Obra *</label>
          <input type="text" name="local_obra" id="localObra" required>
        </div>

        <!-- Concelho -->
        <div>
          <label>Concelho</label>
          <input type="text" name="concelho" id="concelho">
        </div>

        <!-- Limite -->
        <div>
          <label>Data + Hora Limite *</label>
          <input type="datetime-local" name="data_hora_limite" id="dataHoraLimite" required>
        </div>

        <!-- OBS -->
        <div class="full">
          <label>OBS</label>
          <textarea name="obs" id="obs"></textarea>
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      Pedido enviado com sucesso.
    </div>
  </div>

  <script>
    // FUNÇÃO PARA ATUALIZAR A DATA ATUAL
    function atualizarDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHora").value = now.toISOString().slice(0, 16);
    }

    // Executa ao carregar a página
    atualizarDataAtual();

    // VIA OUTROS
    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");

    viaSelect.addEventListener("change", function () {
      if (viaSelect.value === "Outros") {
        outrosDiv.style.display = "block";
      } else {
        outrosDiv.style.display = "none";
      }
    });

    // FORM
    const form = document.getElementById("formulario");
    const success = document.getElementById("successMessage");
    const btnEnviar = document.getElementById("btnEnviar");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // --- CONFIGURAÇÃO DA LINHA DO EXCEL ---
      // Recolhe os valores atuais, limpando quebras de linha nos campos de texto longo (serviço e obs)
      const nome = document.getElementById("nome").value;
      const dataHora = document.getElementById("dataHora").value;
      const requerente = document.getElementById("requerente").value;
      const empresa = document.getElementById("empresa").value;
      const via = viaSelect.value === "Outros" ? document.getElementById("viaOutros").value : viaSelect.value;
      const servico = document.getElementById("servico").value.replace(/\r?\n|\r/g, " "); // remove quebras de linha
      const localObra = document.getElementById("localObra").value;
      const concelho = document.getElementById("concelho").value || "-";
      const dataHoraLimite = document.getElementById("dataHoraLimite").value;
      const obs = (document.getElementById("obs").value || "-").replace(/\r?\n|\r/g, " ");

      // Junta tudo separado por um caractere de TABULAÇÃO (\t)
      // O Excel interpreta o \t nativamente como "mudar de coluna" ao colar
      document.getElementById("excelLinha").value = `${nome}\t${dataHora}\t${requerente}\t${empresa}\t${via}\t${servico}\t${localObra}\t${concelho}\t${dataHoraLimite}\t${obs}`;
      // --------------------------------------

      // Bloquear o botão para evitar múltiplos cliques
      btnEnviar.disabled = true;
      btnEnviar.innerText = "A enviar...";

      const formData = new FormData(form);

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          success.style.display = "block";
          form.reset();
          
          atualizarDataAtual(); 
          outrosDiv.style.display = "none"; 
          
          setTimeout(() => {
            success.style.display = "none";
          }, 5000);

        } else {
          alert("Erro da API: " + data.message);
        }
      } catch (error) {
        console.error(error);
        alert("Erro de ligação ao servidor.");
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
