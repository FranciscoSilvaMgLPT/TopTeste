<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    h1 { font-size: 34px; margin-bottom: 10px; }
    .subtitle { color: #94a3b8; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #3b82f6; }
    textarea { min-height: 120px; resize: vertical; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
    @media(max-width:700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <div class="container">
    <h1>Registo de Pedidos</h1>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido - Sistema Interno">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="checkbox" name="botcheck" style="display:none;">
      
      <input type="hidden" name="LINHA_EXCEL" id="excelLinha">

      <input type="hidden" name="Data_do_Pedido" id="hiddenData">
      <input type="hidden" name="Hora_do_Pedido" id="hiddenHora">
      <input type="hidden" name="Data_Limite" id="hiddenDataLim">
      <input type="hidden" name="Hora_Limite" id="hiddenHoraLim">

      <div class="grid">
        <div>
          <label>Nome do Técnico *</label>
          <input type="text" name="nome" required>
        </div>
        
        <div>
          <label>Data + Hora *</label>
          <input type="datetime-local" id="dataHoraInput" required>
        </div>

        <div>
          <label>Requerente *</label>
          <input type="text" name="requerente" required>
        </div>
        <div>
          <label>Empresa *</label>
          <input type="text" name="empresa" required>
        </div>
        <div>
          <label>Via</label>
          <select name="via" id="viaSelect">
            <option value="">Selecionar</option>
            <option value="Chamada">Chamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div id="outrosDiv" style="display:none;">
          <label>Especificar Via</label>
          <input type="text" name="via_outros">
        </div>
        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="servico" required></textarea>
        </div>
        <div>
          <label>Local / Obra *</label>
          <input type="text" name="local_obra" required>
        </div>
        <div>
          <label>Concelho</label>
          <input type="text" name="concelho">
        </div>

        <div>
          <label>Data Limite *</label>
          <input type="datetime-local" id="dataHoraLimInput" required>
        </div>

        <div class="full">
          <label>Observações</label>
          <textarea name="obs"></textarea>
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      ✅ Enviado!
    </div>
  </div>

  <script>
    function atualizarDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHoraInput").value = now.toISOString().slice(0, 16);
    }
    atualizarDataAtual();

    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");
    viaSelect.addEventListener("change", () => {
      outrosDiv.style.display = viaSelect.value === "Outros" ? "block" : "none";
    });

    const form = document.getElementById("formulario");
    const btnEnviar = document.getElementById("btnEnviar");
    const successMsg = document.getElementById("successMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const separar = (id) => {
        const val = document.getElementById(id).value;
        return val ? val.split("T") : ["-", "-"];
      };

      const [dPed, hPed] = separar("dataHoraInput");
      const [dLim, hLim] = separar("dataHoraLimInput");

      document.getElementById("hiddenData").value = dPed;
      document.getElementById("hiddenHora").value = hPed;
      document.getElementById("hiddenDataLim").value = dLim;
      document.getElementById("hiddenHoraLim").value = hLim;

      const fd = new FormData(form);
      const n = fd.get("nome") || "";
      const r = fd.get("requerente") || "";
      const em = fd.get("empresa") || "";
      const v = fd.get("via") === "Outros" ? fd.get("via_outros") : fd.get("via");
      const s = (fd.get("servico") || "").replace(/;/g, ",").replace(/\n/g, " ");
      const l = fd.get("local_obra") || "";
      const c = fd.get("concelho") || "-";
      const o = (fd.get("obs") || "").replace(/;/g, ",").replace(/\n/g, " ");

      const sep = ";";
      const linhaExcel = n + sep + dPed + sep + hPed + sep + r + sep + em + sep + v + sep + s + sep + l + sep + c + sep + dLim + sep + hLim + sep + o;
      
      // Injeta a linha no campo que está no topo do HTML
      document.getElementById("excelLinha").value = linhaExcel;

      btnEnviar.disabled = true;
      btnEnviar.innerText = "A enviar...";

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: new FormData(form) 
        });

        const result = await response.json();

        if (result.success) {
          successMsg.style.display = "block";
          form.reset();
          atualizarDataAtual();
          outrosDiv.style.display = "none";
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => { successMsg.style.display = "none"; }, 5000);
        }
      } catch (err) {
        alert("Erro de ligação.");
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
