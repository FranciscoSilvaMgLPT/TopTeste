<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
      padding:30px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:#1e293b;
      padding:35px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    h1{
      font-size:34px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#94a3b8;
      margin-bottom:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:white;
      font-size:15px;
    }

    input:focus,
    textarea:focus,
    select:focus{
      outline:2px solid #3b82f6;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    button{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#1d4ed8;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .success{
      display:none;
      margin-top:20px;
      background:#065f46;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    @media(max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Registo de Pedidos</h1>
    <p class="subtitle">Preenche os dados abaixo.</p>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <!-- WEB3FORMS -->
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="hidden" name="email_template" value="custom">
      <input type="checkbox" name="botcheck" style="display:none;">

      </textarea>

      <div class="grid">
        <!-- Nome -->
        <div>
          <label>Nome *</label>
          <input type="text" name="nome" required>
        </div>

        <!-- Data Hora -->
        <div>
          <label>Data + Hora *</label>
          <input type="datetime-local" name="data_hora" id="dataHora" required>
        </div>

        <!-- Requerente -->
        <div>
          <label>Requerente *</label>
          <input type="text" name="requerente" required>
        </div>

        <!-- Empresa -->
        <div>
          <label>Empresa *</label>
          <input type="text" name="empresa" required>
        </div>

        <!-- Via -->
        <div>
          <label>Via</label>
          <select name="via" id="viaSelect">
            <option value="">Selecionar</option>
            <option value="Chamada">Chamada</option>
            <option value="Presencial">Presencial</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <!-- Outros -->
        <div id="outrosDiv" style="display:none;">
          <label>Especificar</label>
          <input type="text" name="via_outros" placeholder="Especificar">
        </div>

        <!-- Serviço -->
        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="servico" required></textarea>
        </div>

        <!-- Local -->
        <div>
          <label>Local / Obra *</label>
          <input type="text" name="local_obra" required>
        </div>

        <!-- Concelho -->
        <div>
          <label>Concelho</label>
          <input type="text" name="concelho">
        </div>

        <!-- Limite -->
        <div>
          <label>Data + Hora Limite</label>
          <input type="datetime-local" name="data_hora_limite" id="dataLimite">
        </div>

        <!-- OBS -->
        <div class="full">
          <label>OBS</label>
          <textarea name="obs"></textarea>
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      Pedido enviado com sucesso.
    </div>
  </div>

  <script>
    // FUNÇÃO PARA ATUALIZAR A DATA ATUAL NO INPUT
    function definirDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHora").value = now.toISOString().slice(0, 16);
    }

    // Executa ao carregar a página
    definirDataAtual();

    // VIA OUTROS
    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");

    viaSelect.addEventListener("change", function () {
      if (viaSelect.value === "Outros") {
        outrosDiv.style.background = "transparent"; // Prevenção visual
        outrosDiv.style.display = "block";
      } else {
        outrosDiv.style.display = "none";
        outrosDiv.querySelector('input').value = ""; // Limpa o campo se mudar de opção
      }
    });

    // FORM
    const form = document.getElementById("formulario");
    const success = document.getElementById("successMessage");
    const dataLimite = document.getElementById("dataLimite");
    const btnEnviar = document.getElementById("btnEnviar");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Feedback visual de carregamento
      btnEnviar.disabled = true;
      btnEnviar.innerText = "A enviar...";

      // Clona os dados do formulário para envio seguro
      const formData = new FormData(form);

      // Se a data limite estiver vazia, removemos do FormData que vai para a API
      // Desta forma não precisamos desativar o input real do HTML
      if (dataLimite.value === "") {
        formData.delete("data_hora_limite");
      }

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          // Mostra sucesso
          success.style.display = "block";
          
          // Limpa o formulário de forma segura
          form.reset();
          
          // Garante que os campos dinâmicos voltam ao estado correto
          outrosDiv.style.display = "none";
          definirDataAtual();

          // Esconde a mensagem de sucesso após 5 segundos
          setTimeout(() => {
            success.style.display = "none";
          }, 5000);

        } else {
          alert("Erro da API: " + data.message);
        }
      } catch (error) {
        console.error(error);
        alert("Erro de ligação ao servidor.");
      } finally {
        // Restaura o botão de envio após o término da operação (sucesso ou erro)
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
