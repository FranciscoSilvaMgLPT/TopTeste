<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>

  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Formulário</h1>

  <form action="https://api.web3forms.com/submit" method="POST">

    <!-- Trocar pela tua API KEY -->
    <input type="hidden" name="access_key" value="SUA_API_KEY">

    <input type="text" name="nome" placeholder="Nome" required>

    <input type="email" name="email" placeholder="Email" required>

    <textarea name="mensagem" placeholder="Mensagem" required></textarea>

    <button type="submit">
      Enviar
    </button>

  </form>

</body>
</html>
